services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: promo
      POSTGRES_PASSWORD: promo_secret
      POSTGRES_DB: promo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promo -d promo_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: development
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: promo
      DB_PASSWORD: promo_secret
      DB_NAME: promo_db
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  api-production:
    build:
      context: .
      target: production
    restart: unless-stopped
    command: sh -c "npm run migration:run && npm run start"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: promo
      DB_PASSWORD: promo_secret
      DB_NAME: promo_db
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - production

volumes:
  postgres_data: